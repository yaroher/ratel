syntax = "proto3";

package store;

option go_package = "github.com/yaroher/ratel/examples/proto/storepb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "ratelproto/ratelproto.proto";
import "examples/proto/goplain/goplain.proto";

// ============================================================================
// Type Aliases для ID
// ============================================================================

// EntityID - базовый type alias для ID сущностей
message EntityID {
  option (goplain.message) = {
    generate: true
    type_alias: true
  };
  int64 value = 1;
}

// ============================================================================
// Timestamps - embedded message для created_at/updated_at
// ============================================================================
message Timestamps {
  option (goplain.message).generate = true;
  
  google.protobuf.Timestamp created_at = 1 [(ratel.column) = {
    constraints: { default_value: "now()" }
  }];
  
  google.protobuf.Timestamp updated_at = 2 [(ratel.column) = {
    constraints: { default_value: "now()" }
  }];
}

// ============================================================================
// BaseEntity - базовая сущность с ID и timestamps (nested embed)
// ============================================================================
message BaseEntity {
  option (goplain.message).generate = true;
  
  EntityID id = 1 [(ratel.column) = {
    constraints: { primary_key: true }
  }];
  
  Timestamps timestamps = 2 [(goplain.field).embed = true];
}

// ============================================================================
// Currency - справочник валют (не использует BaseEntity)
// ============================================================================
message Currency {
  option (goplain.message).generate = true;
  option (ratel.table) = {
    generate: true
    table_name: "currency"
  };
  
  string code = 1 [(ratel.column) = {
    constraints: { primary_key: true, check: "code <> ''" }
  }];
  
  string name = 2;
}

// ============================================================================
// User - пользователь системы (с BaseEntity)
// ============================================================================
message User {
  option (goplain.message).generate = true;
  option (ratel.table) = {
    generate: true
    table_name: "users"
    schema: "store"
    indexes: [
      { columns: ["email"], unique: true },
      { columns: ["is_active", "created_at"] }
    ]
  };
  
  // Embedded BaseEntity (id + timestamps)
  BaseEntity base = 1 [(goplain.field).embed = true];
  
  string email = 2 [(ratel.column) = {
    constraints: { unique: true }
  }];
  
  string full_name = 3;
  
  bool is_active = 4 [(ratel.column) = {
    constraints: { default_value: "true" }
  }];

  // Nullable via proto3 optional on Timestamp
  optional google.protobuf.Timestamp email_confirmed_at = 5;

  // Nullable via proto3 optional on scalar
  optional string nickname = 6;

  // Nullable via proto3 optional on Timestamp
  optional google.protobuf.Timestamp deleted_at = 7;

  // OneToMany: User has many Orders
  repeated Order orders = 10 [(ratel.relation) = {
    one_to_many: {
      ref_name: "user_id"
      on_delete_cascade: true
    }
  }];
  
  // HasOne: User has one Profile
  Profile profile = 11 [(ratel.relation) = {
    has_one: { ref_name: "user_id" }
  }];
}

// ============================================================================
// Profile - профиль пользователя (один к одному с User)
// ============================================================================
message Profile {
  option (goplain.message).generate = true;
  option (ratel.table) = {
    generate: true
    table_name: "profiles"
    schema: "store"
    indexes: [
      { columns: ["user_id"], unique: true }
    ]
  };
  
  // Embedded BaseEntity (id + timestamps)
  BaseEntity base = 1 [(goplain.field).embed = true];
  
  EntityID user_id = 2;  // FK to users.id (unique - one profile per user)
  
  string bio = 3;
  
  string avatar_url = 4;
  
  // BelongsTo: Profile belongs to User
  User user = 10 [(ratel.relation) = {
    belongs_to: { foreign_key: "user_id" }
  }];
}

// ============================================================================
// Category - категория товаров (с BaseEntity)
// ============================================================================
message Category {
  option (goplain.message).generate = true;
  option (ratel.table) = {
    generate: true
    table_name: "categories"
    schema: "store"
  };
  
  // Embedded BaseEntity (id + timestamps)
  BaseEntity base = 1 [(goplain.field).embed = true];
  
  string name = 2;
  
  string slug = 3 [(ratel.column) = {
    constraints: { unique: true }
  }];
  
  google.protobuf.Int64Value parent_id = 4;
}

// ============================================================================
// Tag - тег для товаров (с BaseEntity)
// ============================================================================
message Tag {
  option (goplain.message).generate = true;
  option (ratel.table) = {
    generate: true
    table_name: "tags"
  };
  
  // Embedded BaseEntity (id + timestamps)
  BaseEntity base = 1 [(goplain.field).embed = true];
  
  string name = 2;
  
  string slug = 3 [(ratel.column) = {
    constraints: { unique: true }
  }];
}

// ============================================================================
// Product - товар (с BaseEntity)
// ============================================================================
message Product {
  option (goplain.message).generate = true;
  option (ratel.table) = {
    generate: true
    table_name: "products"
    schema: "store"
    constraints: ["CHECK (stock_qty >= 0)"]
    indexes: [
      { columns: ["sku"] },
      { columns: ["currency"] },
      { columns: ["is_deleted", "created_at"], where: "is_deleted = false" }
    ]
  };
  
  // Embedded BaseEntity (id + timestamps)
  BaseEntity base = 1 [(goplain.field).embed = true];
  
  string sku = 2 [(ratel.column) = {
    constraints: { unique: true }
  }];
  
  string name = 3;
  
  double price = 4;
  
  string currency = 5;  // FK to currency.code
  
  int32 stock_qty = 6 [(ratel.column) = {
    constraints: { default_value: "0" }
  }];
  
  bool is_deleted = 7 [(ratel.column) = {
    constraints: { default_value: "false" }
  }];
  
  // ManyToMany: Product has many Categories
  repeated Category categories = 10 [(ratel.relation) = {
    many_to_many: {
      ref_on_delete_cascade: true
      back_ref_on_delete_cascade: true
    }
  }];
  
  // ManyToMany: Product has many Tags
  repeated Tag tags = 11 [(ratel.relation) = {
    many_to_many: {
      ref_on_delete_cascade: true
      back_ref_on_delete_cascade: true
    }
  }];
}

// ============================================================================
// Order - заказ (с BaseEntity)
// ============================================================================
message Order {
  option (goplain.message).generate = true;
  option (ratel.table) = {
    generate: true
    table_name: "orders"
    schema: "store"
    constraints: ["CHECK (status IN ('NEW', 'PAID', 'CANCELLED', 'SHIPPED'))"]
    indexes: [
      { columns: ["user_id"] },
      { columns: ["status"] },
      { columns: ["created_at"] }
    ]
  };
  
  // Embedded BaseEntity (id + timestamps)
  BaseEntity base = 1 [(goplain.field).embed = true];
  
  EntityID user_id = 2;  // FK to users.id
  
  string status = 3 [(ratel.column) = {
    constraints: { default_value: "'NEW'" }
  }];
  
  string currency = 4;  // FK to currency.code
  
  // OneToMany: Order has many OrderItems
  repeated OrderItem items = 10 [(ratel.relation) = {
    one_to_many: {
      ref_name: "order_id"
      on_delete_cascade: true
    }
  }];
  
  // BelongsTo: Order belongs to User
  User user = 11 [(ratel.relation) = {
    belongs_to: { foreign_key: "user_id" }
  }];
  
  // BelongsTo: Order belongs to Currency
  Currency money = 12 [(ratel.relation) = {
    belongs_to: { 
      foreign_key: "currency"
      owner_key: "code"
    }
  }];
}

// ============================================================================
// OrderItem - позиция заказа (без BaseEntity - композитный PK)
// ============================================================================
message OrderItem {
  option (goplain.message).generate = true;
  option (ratel.table) = {
    generate: true
    table_name: "order_items"
    schema: "store"
    constraints: [
      "CHECK (line_no > 0)",
      "CHECK (qty > 0)"
    ]
    // Composite primary key
    primary_key: { columns: ["order_id", "line_no"] }
    // Composite unique constraint
    unique: [{ columns: ["order_id", "product_id"] }]
  };
  
  EntityID order_id = 1;   // FK to orders.id
  int32 line_no = 2;
  EntityID product_id = 3; // FK to products.id
  int32 qty = 4;
  double unit_price = 5;
  
  // BelongsTo: OrderItem belongs to Order
  Order order = 10 [(ratel.relation) = {
    belongs_to: { foreign_key: "order_id" }
  }];
  
  // BelongsTo: OrderItem belongs to Product
  Product product = 11 [(ratel.relation) = {
    belongs_to: { foreign_key: "product_id" }
  }];
}
