version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - misspell
    - unconvert
    - unparam
    - prealloc

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    misspell:
      locale: US

    unparam:
      check-exported: false

  exclusions:
    rules:
      # Exclude some linters from running on test files
      - path: _test\.go
        linters:
          - errcheck
          - unparam

      # Exclude generated files
      - path: \.pb\.go$
        linters:
          - all

      - path: _ratel\.pb\.go$
        linters:
          - all

      - path: _plain\.pb\.go$
        linters:
          - all

      # CLI commands - MarkFlagRequired errors are okay
      - path: cmd/
        text: "Error return value of .*(MarkFlagRequired|MarkFlagFilename).* is not checked"

      # Close/Remove/Sscanf errors are okay to ignore
      - text: "Error return value of .*(Close|Remove|Sscanf).* is not checked"
        linters:
          - errcheck

      # Style suggestions in internal code
      - text: "QF1003:|QF1008:"
        linters:
          - staticcheck

      # Internal functions where unused params are part of the interface contract
      - path: internal/
        linters:
          - unparam

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true

    goimports:
      local-prefixes:
        - github.com/yaroher/ratel
