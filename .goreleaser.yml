version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ratel
    main: ./cmd/ratel
    binary: ratel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: protoc-gen-ratel
    main: ./cmd/protoc-gen-ratel
    binary: protoc-gen-ratel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: ratel
    builds:
      - ratel
      - protoc-gen-ratel
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: yaroher
    name: ratel
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Ratel {{ .Tag }}
  footer: |
    **Full Changelog**: https://github.com/yaroher/ratel/compare/{{ .PreviousTag }}...{{ .Tag }}
